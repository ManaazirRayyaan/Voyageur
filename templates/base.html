{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Voyageur{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body { font-family: "Plus Jakarta Sans", sans-serif; background: linear-gradient(180deg, #f8fbff 0%, #ffffff 45%, #f8fafc 100%); color: #0f172a; }
    .font-display { font-family: "Playfair Display", serif; }
    .glass-nav { backdrop-filter: blur(18px); background: rgba(15, 23, 42, 0.88); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .section-card, .travel-card { background: rgba(255,255,255,0.94); border: 1px solid rgba(148,163,184,0.18); box-shadow: 0 16px 40px rgba(15,23,42,0.08); border-radius: 1.5rem; }
    .travel-card { transition: transform .25s ease, box-shadow .25s ease; }
    .travel-card:hover { transform: translateY(-4px); box-shadow: 0 24px 60px rgba(37,99,235,0.14); }
    .btn-primary { background: linear-gradient(135deg, #2563eb, #06b6d4); color: #fff; box-shadow: 0 16px 34px rgba(37,99,235,0.28); }
    .btn-secondary { background: rgba(255,255,255,0.88); color: #0f172a; border: 1px solid rgba(148,163,184,0.22); }
    .badge-gradient { background: linear-gradient(135deg, rgba(37,99,235,.12), rgba(6,182,212,.12)); color: #2563eb; border: 1px solid rgba(37,99,235,.12); }
    .rating-stars { color: #f59e0b; }
    .dashboard-shell { display: flex; height: calc(100vh - 80px); margin: 0; padding: 0; }
    .dashboard-sidebar { width: 280px; flex-shrink: 0; height: 100%; background: linear-gradient(180deg, #0f172a 0%, #13284d 100%); color: white; padding: 1.5rem; }
    .dashboard-main { flex: 1 1 auto; min-width: 0; height: 100%; overflow-y: auto; padding: 0; margin: 0; background: transparent; }
    .dashboard-topbar { height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; margin: 0; border-bottom: 1px solid rgba(226,232,240,0.9); background: rgba(255,255,255,0.88); backdrop-filter: blur(14px); }
    .back-button { position: fixed; top: 5.75rem; left: 1rem; z-index: 60; display: inline-flex; align-items: center; gap: .5rem; border-radius: 9999px; background: rgba(255,255,255,.96); padding: .7rem 1rem; font-size: .875rem; font-weight: 700; color: #0f172a; box-shadow: 0 14px 30px rgba(15,23,42,.12); border: 1px solid rgba(148,163,184,.18); }
    .auth-panel { background: radial-gradient(circle at top left, rgba(255,255,255,.18), transparent 34%), linear-gradient(145deg, #0f172a, #0f766e 88%); }
  </style>
</head>
<body class="{% block body_class %}bg-slate-50{% endblock %}">
  {% include "includes/navbar.html" %}
  {% if request.path != '/' %}
    <a href="/" class="back-button"><i class="fa-solid fa-arrow-left"></i> <span>Back</span></a>
  {% endif %}
  {% include "includes/messages.html" %}
  {% block content %}{% endblock %}
</body>
</html>

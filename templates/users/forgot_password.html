{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<main class="mx-auto max-w-xl px-4 py-12 sm:px-6 lg:px-8">
  <section class="section-card p-8">
    <h1 class="font-display text-4xl font-semibold">Forgot password</h1>
    <form method="post" class="mt-8 space-y-4">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <div>{{ form.email.label_tag }}{{ form.email }}{{ form.email.errors }}</div>
      <button type="submit" class="btn-primary w-full rounded-2xl px-5 py-3 text-sm font-semibold">Send reset link</button>
    </form>
  </section>
</main>
{% endblock %}

<header class="glass-nav sticky top-0 z-50 h-20">
  <div class="mx-auto flex h-20 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8 text-white">
    <a href="{% url 'dashboard:home' %}" class="flex items-center gap-3">
      <span class="flex h-11 w-11 items-center justify-center rounded-2xl bg-white/15"><i class="fa-solid fa-compass"></i></span>
      <div>
        <strong class="block text-lg">Voyageur</strong>
        <span class="text-xs text-slate-200">Travel Planner</span>
      </div>
    </a>
    <nav class="hidden items-center gap-8 text-sm font-medium lg:flex">
      <a href="{% url 'packages:list' %}">Packages</a>
      <a href="{% url 'bookings:custom_trip' %}">Custom Trips</a>
      <a href="{% url 'reviews:list' %}">Reviews</a>
      {% if request.user.is_authenticated %}
        <a href="{% url 'users:wishlist' %}">Wishlist</a>
        <a href="{% url 'dashboard:user_dashboard' %}">Dashboard</a>
        <a href="{% url 'users:logout' %}" class="rounded-full border border-white/20 px-5 py-2.5">Logout</a>
      {% else %}
        <a href="{% url 'users:login' %}" class="rounded-full border border-white/20 px-5 py-2.5">Sign In</a>
      {% endif %}
    </nav>
  </div>
</header>
